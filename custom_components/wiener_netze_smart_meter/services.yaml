fetch_data:
  name: Fetch Smart Meter Data
  description: Fetch energy consumption data from Wiener Netze for the specified number of past days and insert hourly statistics.
  fields:
    days:
      name: Days
      description: Number of days in the past to fetch data for.
      required: false
      default: 7
      example: 60
      selector:
        number:
          min: 1
          max: 365
          mode: box
          unit_of_measurement: days
